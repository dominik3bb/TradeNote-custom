name: tradenote
services:
  tradenote:
    image: eleventrading/tradenote
    container_name: tradenote_app
    ports:
      - 8080:8080
    environment:
      MONGO_URI: mongodb://dominik3bb:DavDom99@mongo:27017/tradenote?authSource=admin
      TRADENOTE_DATABASE: tradenote
      APP_ID: 1912193007
      MASTER_KEY: DavDom99
      TRADENOTE_PORT: 8080
    networks:
      - tradenote_net
  mongo:
    image: mongo:latest
    container_name: tradenote_db
    volumes:
      - tradenote_db:/data/db
    ports:
      - 27017:27017
    environment:
      MONGO_INITDB_ROOT_USERNAME: dominik3bb
      MONGO_INITDB_ROOT_PASSWORD: DavDom99
      MONGO_INITDB_DATABASE: tradenote
    networks:
      - tradenote_net
networks:
  tradenote_net:
    driver: bridge

volumes:
  tradenote_db:
    name: tradenote_db